<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登山背包智能监测系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@font-face {
  font-family: 'Digital';
  src: local('Consolas'), local('monospace');
}

body {
  background: #0a0e1a;
  color: #e0e6f0;
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ===== 顶部标题栏 ===== */
.header {
  height: 70px;
  background: linear-gradient(180deg, rgba(10,14,40,0.95) 0%, rgba(10,14,26,0.8) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  border-bottom: 1px solid rgba(0,180,255,0.3);
}

.header::before, .header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  width: 30%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00b4ff, transparent);
}
.header::before { left: 0; }
.header::after { right: 0; }

.header h1 {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 8px;
  background: linear-gradient(90deg, #00b4ff, #00ffd5, #00b4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(0,180,255,0.3);
}

.header .time-display {
  position: absolute;
  right: 30px;
  font-size: 14px;
  color: #7a8ba8;
  font-family: 'Digital', monospace;
}

.header .status-badge {
  position: absolute;
  left: 30px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #00ffd5;
}

.header .status-dot {
  width: 8px; height: 8px;
  background: #00ffd5;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px #00ffd5; }
  50% { opacity: 0.4; box-shadow: 0 0 12px #00ffd5; }
}

/* ===== 主布局 ===== */
.main-container {
  display: grid;
  grid-template-columns: 340px 1fr 340px;
  height: calc(100vh - 70px);
  gap: 0;
  padding: 15px;
}

/* ===== 面板通用样式 ===== */
.panel {
  background: linear-gradient(135deg, rgba(15,20,40,0.9) 0%, rgba(10,14,26,0.95) 100%);
  border: 1px solid rgba(0,180,255,0.15);
  border-radius: 8px;
  padding: 16px;
  position: relative;
  overflow: hidden;
}

.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,180,255,0.5), transparent);
}

.panel-title {
  font-size: 15px;
  font-weight: 600;
  color: #00b4ff;
  margin-bottom: 14px;
  padding-left: 12px;
  position: relative;
  letter-spacing: 2px;
}

.panel-title::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 14px;
  background: #00b4ff;
  border-radius: 2px;
}

/* ===== 左侧面板 ===== */
.left-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
  height: 100%;
}

/* 统计卡片 */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-card {
  background: rgba(0,180,255,0.05);
  border: 1px solid rgba(0,180,255,0.1);
  border-radius: 6px;
  padding: 12px;
  text-align: center;
}

.stat-card .value {
  font-size: 28px;
  font-weight: 700;
  font-family: 'Digital', monospace;
}

.stat-card .label {
  font-size: 11px;
  color: #7a8ba8;
  margin-top: 4px;
}

.stat-card.online .value { color: #00ffd5; }
.stat-card.alarm .value { color: #ff4757; }
.stat-card.temp .value { color: #ffa502; }
.stat-card.humi .value { color: #70a1ff; }

/* 成员列表 */
.member-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.member-list::-webkit-scrollbar { width: 3px; }
.member-list::-webkit-scrollbar-track { background: transparent; }
.member-list::-webkit-scrollbar-thumb { background: rgba(0,180,255,0.3); border-radius: 3px; }

.member-card {
  background: rgba(0,180,255,0.03);
  border: 1px solid rgba(0,180,255,0.1);
  border-radius: 6px;
  padding: 12px;
  transition: all 0.3s;
  cursor: pointer;
}

.member-card:hover {
  border-color: rgba(0,180,255,0.4);
  background: rgba(0,180,255,0.08);
}

.member-card.active {
  border-color: rgba(0,180,255,0.6);
  background: rgba(0,180,255,0.12);
  box-shadow: 0 0 12px rgba(0,180,255,0.15);
}

.member-card.alarm-state {
  border-color: rgba(255,71,87,0.5);
  animation: alarm-border 1s infinite;
}

@keyframes alarm-border {
  0%, 100% { border-color: rgba(255,71,87,0.5); }
  50% { border-color: rgba(255,71,87,0.1); }
}

.member-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.member-name {
  font-size: 14px;
  font-weight: 600;
  color: #e0e6f0;
}

.member-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}

.member-status.normal {
  background: rgba(0,255,213,0.1);
  color: #00ffd5;
}

.member-status.alarm {
  background: rgba(255,71,87,0.15);
  color: #ff4757;
}

.member-details {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}

.member-detail {
  text-align: center;
}

.member-detail .detail-value {
  font-size: 16px;
  font-weight: 600;
  font-family: 'Digital', monospace;
}

.member-detail .detail-label {
  font-size: 10px;
  color: #7a8ba8;
  margin-top: 2px;
}

.member-detail .detail-value.temp-val { color: #ffa502; }
.member-detail .detail-value.humi-val { color: #70a1ff; }
.member-detail .detail-value.loc-val { color: #a55eea; font-size: 11px; }

/* ===== 中间3D区域 ===== */
.center-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  background: rgba(15,20,40,0.5); /* 添加半透明背景以区分区域 */
  border: 1px solid rgba(0,180,255,0.1);
  border-radius: 8px;
  overflow: hidden; /* 确保内容不溢出 */
}

#backpack-canvas {
  width: 100%;
  height: 100%;
  display: block; /* 防止画布下方出现空隙 */
}

.center-overlay {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  background: rgba(10,14,26,0.8);
  border: 1px solid rgba(0,180,255,0.2);
  border-radius: 20px;
  padding: 8px 20px;
  backdrop-filter: blur(10px); /* 添加模糊背景效果 */
}

.overlay-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #7a8ba8;
}

.overlay-item .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}

.dot.green { background: #00ffd5; }
.dot.orange { background: #ffa502; }
.dot.red { background: #ff4757; }

/* ===== 右侧面板 ===== */
.right-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* 报警日志 */
.alarm-log {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.alarm-log::-webkit-scrollbar { width: 3px; }
.alarm-log::-webkit-scrollbar-track { background: transparent; }
.alarm-log::-webkit-scrollbar-thumb { background: rgba(255,71,87,0.3); border-radius: 3px; }

.alarm-item {
  background: rgba(255,71,87,0.05);
  border-left: 3px solid #ff4757;
  border-radius: 0 4px 4px 0;
  padding: 8px 10px;
  font-size: 12px;
}

.alarm-item .alarm-time {
  color: #7a8ba8;
  font-size: 10px;
  margin-bottom: 4px;
}

.alarm-item .alarm-msg {
  color: #ff6b7a;
  line-height: 1.4;
}

.alarm-item .alarm-type-tag {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  margin-right: 4px;
  font-weight: 500;
}

.alarm-type-tag.fall { background: rgba(255,71,87,0.2); color: #ff4757; }
.alarm-type-tag.drown { background: rgba(0,180,255,0.2); color: #00b4ff; }
.alarm-type-tag.cliff { background: rgba(255,165,2,0.2); color: #ffa502; }
.alarm-type-tag.distance { background: rgba(165,94,234,0.2); color: #a55eea; }

/* 环境监测 */
.env-chart {
  height: 120px;
  position: relative;
  margin-top: 8px;
}

.env-bar-group {
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  height: 80px;
  padding: 0 10px;
  margin-top: 10px;
}

.env-bar {
  width: 30px;
  border-radius: 3px 3px 0 0;
  position: relative;
  transition: height 0.5s;
}

.env-bar .bar-label {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: #7a8ba8;
  white-space: nowrap;
}

.env-bar .bar-value {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  font-weight: 600;
}

/* 成员详情面板 */
.member-detail-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  max-width: 500px;
  background: linear-gradient(135deg, rgba(15,20,40,0.95) 0%, rgba(10,14,26,0.98) 100%);
  border: 1px solid rgba(0,180,255,0.3);
  border-radius: 12px;
  padding: 24px;
  z-index: 1000;
  display: none;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.member-detail-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,180,255,0.5), transparent);
}

.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.detail-avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00b4ff, #00ffd5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 600;
  color: #0a0e1a;
}

.detail-info h2 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 4px;
  background: linear-gradient(90deg, #00b4ff, #00ffd5, #00b4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.detail-info .role {
  font-size: 14px;
  color: #7a8ba8;
}

.detail-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,71,87,0.1);
  border: 1px solid rgba(255,71,87,0.2);
  color: #ff4757;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.3s;
}

.detail-close:hover {
  background: rgba(255,71,87,0.2);
  transform: scale(1.1);
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.detail-item {
  background: rgba(0,180,255,0.05);
  border: 1px solid rgba(0,180,255,0.1);
  border-radius: 8px;
  padding: 16px;
}

.detail-item h3 {
  font-size: 13px;
  color: #7a8ba8;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.detail-item .detail-value {
  font-size: 24px;
  font-weight: 700;
  font-family: 'Digital', monospace;
}

.detail-item .detail-unit {
  font-size: 14px;
  color: #7a8ba8;
  margin-left: 4px;
}

.detail-item .detail-status {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  margin-top: 4px;
}

.detail-status.normal { background: rgba(0,255,213,0.1); color: #00ffd5; }
.detail-status.alarm { background: rgba(255,71,87,0.15); color: #ff4757; }
.detail-status.warning { background: rgba(255,165,2,0.15); color: #ffa502; }

/* 底部状态栏 */
.bottom-status {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.status-item {
  background: rgba(0,180,255,0.05);
  border: 1px solid rgba(0,180,255,0.1);
  border-radius: 6px;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.status-icon.battery { background: rgba(0,255,213,0.1); }
.status-icon.signal { background: rgba(0,180,255,0.1); }
.status-icon.gps { background: rgba(165,94,234,0.1); }
.status-icon.sensor { background: rgba(255,165,2,0.1); }

.status-info .status-value {
  font-size: 14px;
  font-weight: 600;
}

.status-info .status-label {
  font-size: 10px;
  color: #7a8ba8;
}

/* 粒子背景 */
#particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: -1;
}

/* 加载动画 */
.loading-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #0a0e1a;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s;
}

.loading-spinner {
  width: 50px; height: 50px;
  border: 3px solid rgba(0,180,255,0.1);
  border-top-color: #00b4ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* 针对不同分辨率的优化 */
@media (max-width: 1920px) {
  .main-container {
    grid-template-columns: 340px 1fr 340px;
  }
  .header h1 {
    font-size: 28px;
    letter-spacing: 8px;
  }
}

@media (max-width: 1600px) {
  .main-container {
    grid-template-columns: 300px 1fr 300px;
  }
  .header h1 {
    font-size: 26px;
    letter-spacing: 7px;
  }
  .stat-card .value {
    font-size: 26px;
  }
  .member-detail .detail-value {
    font-size: 15px;
  }
}

@media (max-width: 1400px) {
  .main-container {
    grid-template-columns: 280px 1fr 280px;
  }
  .header h1 {
    font-size: 24px;
    letter-spacing: 6px;
  }
}

@media (max-width: 1200px) {
  .main-container {
    grid-template-columns: 250px 1fr 250px;
  }
  .header h1 {
    font-size: 22px;
    letter-spacing: 5px;
  }
  .stat-card .value {
    font-size: 24px;
  }
  .member-detail .detail-value {
    font-size: 14px;
  }
}

@media (max-width: 1080px) {
  .main-container {
    grid-template-columns: 220px 1fr 220px;
  }
  .header h1 {
    font-size: 20px;
    letter-spacing: 4px;
  }
  .stats-row {
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .member-details {
    grid-template-columns: 1fr 1fr;
  }
  .env-bar {
    width: 25px;
  }
}

@media (max-width: 768px) {
  .main-container {
    grid-template-columns: 1fr;
    height: calc(100vh - 140px); /* 增加高度以适应折叠后的面板 */
  }
  .left-panel, .right-panel {
    display: none; /* 在小屏幕上隐藏侧边栏，可以通过按钮切换显示 */
  }
  .left-panel.show, .right-panel.show {
    display: flex;
    position: absolute;
    top: 70px;
    height: calc(100vh - 70px);
    z-index: 100;
    background: rgba(10,14,40,0.95);
    border-right: 1px solid rgba(0,180,255,0.15);
  }
  .header {
    height: 60px;
  }
  .header h1 {
    font-size: 18px;
    letter-spacing: 2px;
  }
  .center-overlay {
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    font-size: 11px;
  }
  .stats-row {
    grid-template-columns: 1fr 1fr;
  }
}

/* 移动端适配 */
@media (max-width: 480px) {
  .header {
    height: 50px;
    padding: 0 10px;
  }
  .header h1 {
    font-size: 14px;
    letter-spacing: 1px;
  }
  .header .time-display {
    font-size: 12px;
    right: 10px;
  }
  .header .status-badge {
    left: 10px;
    font-size: 12px;
  }
  .main-container {
    padding: 10px;
    gap: 10px;
  }
  .panel {
    padding: 12px;
  }
  .panel-title {
    font-size: 14px;
    margin-bottom: 10px;
  }
  .stat-card .value {
    font-size: 20px;
  }
  .member-detail .detail-value {
    font-size: 12px;
  }
  .env-bar .bar-value {
    font-size: 10px;
  }
  .env-bar .bar-label {
    font-size: 9px;
    bottom: -16px;
  }
  .status-info .status-value {
    font-size: 12px;
  }
  .alarm-item {
    font-size: 11px;
    padding: 6px 8px;
    }
    .alarm-item .alarm-time {
      font-size: 9px;
    }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
</div>

<canvas id="particles"></canvas>

<!-- 成员详情面板 -->
<div class="member-detail-panel" id="member-detail">
  <div class="detail-header">
    <div style="display: flex; align-items: center; gap: 16px;">
      <div class="detail-avatar" id="detail-avatar">张</div>
      <div class="detail-info">
        <h2 id="detail-name">张明远</h2>
        <div class="role" id="detail-role">队长</div>
      </div>
    </div>
    <div class="detail-close" onclick="closeMemberDetail()">×</div>
  </div>
  <div class="detail-grid">
    <div class="detail-item">
      <h3>实时温度</h3>
      <div><span class="detail-value temp-val" id="detail-temp">--</span><span class="detail-unit">°C</span></div>
      <div class="detail-status normal" id="detail-temp-status">正常</div>
    </div>
    <div class="detail-item">
      <h3>实时湿度</h3>
      <div><span class="detail-value humi-val" id="detail-humi">--</span><span class="detail-unit">%</span></div>
      <div class="detail-status normal" id="detail-humi-status">正常</div>
    </div>
    <div class="detail-item">
      <h3>心率</h3>
      <div><span class="detail-value" id="detail-hr">--</span><span class="detail-unit">bpm</span></div>
      <div class="detail-status normal" id="detail-hr-status">正常</div>
    </div>
    <div class="detail-item">
      <h3>电池电量</h3>
      <div><span class="detail-value" id="detail-battery">--</span><span class="detail-unit">%</span></div>
      <div class="detail-status normal" id="detail-battery-status">正常</div>
    </div>
    <div class="detail-item">
      <h3>位置信息</h3>
      <div class="detail-value" id="detail-loc">--</div>
      <div class="detail-status normal">定位中</div>
    </div>
    <div class="detail-item">
      <h3>状态</h3>
      <div class="detail-status normal" id="detail-alarm-status">正常</div>
    </div>
  </div>
</div>

<!-- 顶部标题 -->
<div class="header">
  <div class="status-badge">
    <span class="status-dot"></span>
    <span>系统在线</span>
  </div>
  <h1>登山背包智能监测系统</h1>
  <div class="time-display" id="time-display"></div>
</div>

<!-- 主内容区 -->
<div class="main-container">
  <!-- 左侧面板 -->
  <div class="left-panel">
    <!-- 统计概览 -->
    <div class="panel">
      <div class="panel-title">实时概览</div>
      <div class="stats-row">
        <div class="stat-card online">
          <div class="value" id="online-count">5</div>
          <div class="label">在线成员</div>
        </div>
        <div class="stat-card alarm">
          <div class="value" id="alarm-count">1</div>
          <div class="label">报警数</div>
        </div>
        <div class="stat-card temp">

function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: Math.random() * 2 + 0.5,
      alpha: Math.random() * 0.3 + 0.1
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0, 180, 255, ${p.alpha})`;
      ctx.fill();
    });

    // 连线
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(0, 180, 255, ${0.08 * (1 - dist/120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(animate);
  }
  animate();

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
}

// ============================================================
// 3D 背包模型 (Three.js)
// ============================================================
function initBackpack3D() {
  const canvas = document.getElementById('backpack-canvas');
  const container = canvas.parentElement;

  // 获取容器的实际尺寸
  const width = container.clientWidth;
  const height = container.clientHeight;

  const scene = new THREE.Scene();
  // 使用较小的FOV以获得更好的视角
  const camera = new THREE.PerspectiveCamera(35, width / height, 0.1, 1000);
  camera.position.set(0, 0.5, 4); // 调整初始距离，不要那么近

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 控制像素比以提高性能
  renderer.setClearColor(0x000000, 0);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // 灯光设置 - 改善照明效果
  const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
  scene.add(ambientLight);

  const mainLight = new THREE.DirectionalLight(0x00b4ff, 0.8);
  mainLight.position.set(3, 5, 3);
  mainLight.castShadow = true;
  scene.add(mainLight);

  const fillLight = new THREE.DirectionalLight(0x00ffd5, 0.4);
  fillLight.position.set(-3, 2, -2);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0xff6b7a, 0.3);
  rimLight.position.set(0, -3, -5);
  scene.add(rimLight);

  // 添加点光源增加细节照明
  const pointLight = new THREE.PointLight(0xffffff, 0.5, 10);
  pointLight.position.set(0, 2, 2);
  scene.add(pointLight);

  // 创建背包组
  const backpack = new THREE.Group();

  // 材质定义 - 使用更真实的材质
  const bodyMat = new THREE.MeshPhongMaterial({
    color: 0x2a4a6b,
    shininess: 30,
    specular: 0x112233,
    flatShading: false // 平滑着色
  });

  const accentMat = new THREE.MeshPhongMaterial({
    color: 0x00b4ff,
    shininess: 60,
    specular: 0x4488aa,
    emissive: 0x001a33
  });

  const strapMat = new THREE.MeshPhongMaterial({
    color: 0x1a3a5c,
    shininess: 20,
    flatShading: false
  });

  const sensorMat = new THREE.MeshPhongMaterial({
    color: 0x00ffd5,
    emissive: 0x004433,
    shininess: 80,
    specular: 0x00ffd5
  });

  // 背包主体 - 优化尺寸和形状
  const bodyWidth = 1.4;
  const bodyHeight = 2.0;
  const bodyDepth = 0.7;
  const bodyGeo = new THREE.BoxGeometry(bodyWidth, bodyHeight, bodyDepth, 4, 4, 4); // 增加细分以改善曲面效果

  // 对主体应用轻微变形以模拟真实背包形状
  const bodyVertices = bodyGeo.attributes.position.array;
  for (let i = 0; i < bodyVertices.length; i += 3) {
    // 在顶部稍微收缩背包宽度，底部稍微扩张
    const y = bodyVertices[i + 1];
    const scale = 0.95 + (y / bodyHeight) * 0.1; // 顶部稍窄，底部稍宽
    bodyVertices[i] *= scale; // x轴缩放
    bodyVertices[i + 2] *= scale; // z轴缩放
  }
  bodyGeo.attributes.position.needsUpdate = true;

  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow = true;
  body.receiveShadow = true;
  backpack.add(body);

  // 顶部圆顶
  const topGeo = new THREE.SphereGeometry(0.7, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
  const top = new THREE.Mesh(topGeo, bodyMat);
  top.position.y = bodyHeight/2 + 0.6;
  top.scale.z = 0.5;
  top.castShadow = true;
  backpack.add(top);

  // 前置口袋
  const pocketWidth = 0.9;
  const pocketHeight = 0.7;
  const pocketDepth = 0.2;
  const pocketGeo = new THREE.BoxGeometry(pocketWidth, pocketHeight, pocketDepth);
  const pocket = new THREE.Mesh(pocketGeo, accentMat);
  pocket.position.set(0, 0.2, bodyDepth/2 + pocketDepth/2);
  pocket.castShadow = true;
  backpack.add(pocket);

  // 底部口袋
  const bottomPocketGeo = new THREE.BoxGeometry(1.1, 0.4, 0.2);
  const bottomPocket = new THREE.Mesh(bottomPocketGeo, bodyMat);
  bottomPocket.position.set(0, -bodyHeight/2 + 0.3, bodyDepth/2 + 0.1);
  bottomPocket.castShadow = true;
  backpack.add(bottomPocket);

  // 侧袋 - 左
  const sidePocketGeo = new THREE.BoxGeometry(0.2, 0.9, 0.5);
  const leftSidePocket = new THREE.Mesh(sidePocketGeo, strapMat);
  leftSidePocket.position.set(bodyWidth/2 + 0.1, 0.1, 0);
  leftSidePocket.castShadow = true;
  backpack.add(leftSidePocket);

  // 侧袋 - 右
  const rightSidePocket = new THREE.Mesh(sidePocketGeo, strapMat);
  rightSidePocket.position.set(-bodyWidth/2 - 0.1, 0.1, 0);
  rightSidePocket.castShadow = true;
  backpack.add(rightSidePocket);

  // 肩带 - 左
  const strapGeo = new THREE.BoxGeometry(0.12, 1.6, 0.08);
  const leftStrap = new THREE.Mesh(strapGeo, strapMat);
  leftStrap.position.set(-0.35, 0.3, -bodyDepth/2 - 0.1);
  leftStrap.rotation.z = 0.15;
  leftStrap.castShadow = true;
  backpack.add(leftStrap);

  // 肩带 - 右
  const rightStrap = new THREE.Mesh(strapGeo, strapMat);
  rightStrap.position.set(0.35, 0.3, -bodyDepth/2 - 0.1);
  rightStrap.rotation.z = -0.15;
  rightStrap.castShadow = true;
  backpack.add(rightStrap);

  // 腰带
  const beltGeo = new THREE.BoxGeometry(1.2, 0.1, 0.1);
  const belt = new THREE.Mesh(beltGeo, strapMat);
  belt.position.set(0, -bodyHeight/2 + 0.2, -bodyDepth/2 - 0.05);
  belt.castShadow = true;
  backpack.add(belt);

  // 提手
  const handleGeo = new THREE.TorusGeometry(0.18, 0.03, 8, 12, Math.PI);
  const handle = new THREE.Mesh(handleGeo, strapMat);
  handle.position.set(0, bodyHeight/2 + 0.75, 0);
  handle.rotation.y = Math.PI / 2;
  handle.castShadow = true;
  backpack.add(handle);

  // 传感器指示灯 (闪烁)
  const sensorGeo = new THREE.SphereGeometry(0.05, 16, 16); // 更光滑的球体
  const sensors = [];

  const sensorPositions = [
    { pos: [0.4, 0.7, bodyDepth/2 + 0.05], color: 0x00ffd5 },
    { pos: [-0.4, 0.7, bodyDepth/2 + 0.05], color: 0x00b4ff },
    { pos: [0, -0.2, bodyDepth/2 + 0.05], color: 0xffa502 },
    { pos: [0.6, -0.4, bodyDepth/2 * 0.7], color: 0xff4757 },
    { pos: [-0.6, -0.4, bodyDepth/2 * 0.7], color: 0x00ffd5 }
  ];

  sensorPositions.forEach((sp, i) => {
    const mat = new THREE.MeshPhongMaterial({
      color: sp.color,
      emissive: sp.color,
      emissiveIntensity: 0.8,
      shininess: 100
    });
    const sensor = new THREE.Mesh(sensorGeo, mat);
    sensor.position.set(...sp.pos);
    sensor.castShadow = true;
    backpack.add(sensor);
    sensors.push({ mesh: sensor, baseIntensity: 0.8, color: sp.color, index: i });
  });

  // 天线
  const antennaGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.4, 8);
  const antenna = new THREE.Mesh(antennaGeo, strapMat);
  antenna.position.set(0.5, bodyHeight/2 + 0.7, -0.15);
  antenna.rotation.z = -0.3;
  antenna.castShadow = true;
  backpack.add(antenna);

  const antennaTipGeo = new THREE.SphereGeometry(0.03, 12, 12);
  const antennaTipMat = new THREE.MeshPhongMaterial({
    color: 0x00b4ff,
    emissive: 0x00b4ff,
    emissiveIntensity: 1.0
  });
  const antennaTip = new THREE.Mesh(antennaTipGeo, antennaTipMat);
  antennaTip.position.set(0.5 + Math.sin(-0.3) * 0.2, bodyHeight/2 + 0.7 + Math.cos(0.3) * 0.2, -0.15);
  antennaTip.castShadow = true;
  backpack.add(antennaTip);

  // 添加地面阴影接收平面
  const groundGeo = new THREE.PlaneGeometry(10, 10);
  const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -bodyHeight;
  ground.receiveShadow = true;
  scene.add(ground);

  // 地面网格
  const gridHelper = new THREE.GridHelper(8, 20, 0x0a2a4a, 0x061a30);
  gridHelper.position.y = -bodyHeight - 0.01; // 稍微低于背包
  scene.add(gridHelper);

  // 底部光环
  const ringGeo = new THREE.RingGeometry(1.5, 1.8, 48);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x00b4ff,
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = -bodyHeight - 0.02;
  scene.add(ring);

  scene.add(backpack);

  // 鼠标交互
  let isDragging = false;
  let previousMousePosition = { x: 0, y: 0 };
  let targetRotationX = 0;
  let targetRotationY = 0;
  let autoRotate = true;

  canvas.addEventListener('mousedown', (e) => {
    isDragging = true;
    autoRotate = false;
    previousMousePosition = { x: e.clientX, y: e.clientY };
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const deltaX = e.clientX - previousMousePosition.x;
    const deltaY = e.clientY - previousMousePosition.y;
    targetRotationY += deltaX * 0.008;
    targetRotationX += deltaY * 0.008;
    targetRotationX = Math.max(-1, Math.min(1, targetRotationX));
    previousMousePosition = { x: e.clientX, y: e.clientY };
  });

  canvas.addEventListener('mouseup', () => {
    isDragging = false;
    setTimeout(() => { autoRotate = true; }, 3000);
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const zoomIntensity = 0.0005; // 减小缩放强度
    camera.position.z += e.deltaY * zoomIntensity;
    camera.position.z = Math.max(2.5, Math.min(10, camera.position.z)); // 限制缩放范围
  }, { passive: false });

  // 触摸支持
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      autoRotate = false;
      previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!isDragging || e.touches.length !== 1) return;
    const deltaX = e.touches[0].clientX - previousMousePosition.x;
    const deltaY = e.touches[0].clientY - previousMousePosition.y;
    targetRotationY += deltaX * 0.008;
    targetRotationX += deltaY * 0.008;
    targetRotationX = Math.max(-1, Math.min(1, targetRotationX));
    previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    isDragging = false;
    setTimeout(() => { autoRotate = true; }, 3000);
  });

  // 动画循环
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const elapsed = clock.getElapsedTime();

    if (autoRotate) {
      targetRotationY += 0.003; // 减缓自动旋转速度
    }

    // 平滑插值旋转
    backpack.rotation.y += (targetRotationY - backpack.rotation.y) * 0.05;
    backpack.rotation.x += (targetRotationX - backpack.rotation.x) * 0.05;

    // 轻微浮动
    backpack.position.y = Math.sin(elapsed * 0.8) * 0.05; // 减小浮动幅度

    // 传感器闪烁 - 改进闪烁效果
    sensors.forEach(s => {
      const blink = Math.sin(elapsed * 3 + s.index * 1.5) * 0.3 + 0.7; // 减少闪烁幅度，更加自然
      s.mesh.material.emissiveIntensity = 0.4 + blink * 0.6;
    });

    // 光环旋转
    ring.rotation.z = elapsed * 0.2;

    renderer.render(scene, camera);
  }
  animate();

  // 响应式 - 优化响应式处理
  window.addEventListener('resize', () => {
    const newWidth = container.clientWidth;
    const newHeight = container.clientHeight;

    camera.aspect = newWidth / newHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(newWidth, newHeight);
  });
}

// ============================================================
// 初始化
// ============================================================
window.addEventListener('load', () => {
  updateTime();
  renderMembers();
  renderAlarmLog();
  updateStats();
  updateEnvBars();
  initParticles();
  initBackpack3D();

  // 隐藏加载
  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
    }, 500);
  }, 800);

  // 时间更新
  setInterval(updateTime, 1000);

  // 模拟数据刷新 (每3秒)
  setInterval(updateMockData, 3000);

  // 动态适配函数
  function handleResize() {
    const width = window.innerWidth;
    const leftPanel = document.querySelector('.left-panel');
    const rightPanel = document.querySelector('.right-panel');

    // 如果屏幕变小，隐藏侧边栏
    if (width < 768) {
      leftPanel.style.display = 'none';
      rightPanel.style.display = 'none';

      // 添加控制按钮
      if (!document.querySelector('#sidebar-toggle')) {
        const toggleBtn = document.createElement('div');
        toggleBtn.id = 'sidebar-toggle';
        toggleBtn.innerHTML = '☰';
        toggleBtn.style.cssText = `
          position: fixed;
          top: 10px;
          left: 10px;
          z-index: 1000;
          background: rgba(0,180,255,0.2);
          border: 1px solid rgba(0,180,255,0.3);
          color: #00b4ff;
          width: 40px;
          height: 40px;
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: 4px;
          font-size: 20px;
          cursor: pointer;
          font-family: Arial, sans-serif;
        `;

        // 添加菜单功能
        let menuOpen = false;
        toggleBtn.addEventListener('click', () => {
          if (window.innerWidth < 768) {
            if (menuOpen) {
              leftPanel.style.display = 'none';
              rightPanel.style.display = 'none';
              toggleBtn.innerHTML = '☰';
            } else {
              leftPanel.style.display = 'flex';
              rightPanel.style.display = 'flex';
              toggleBtn.innerHTML = '✕';
            }
            menuOpen = !menuOpen;
          }
        });

        document.body.appendChild(toggleBtn);
      }
    } else {
      // 大屏幕显示所有面板
      leftPanel.style.display = 'flex';
      rightPanel.style.display = 'flex';
      const toggleBtn = document.querySelector('#sidebar-toggle');
      if (toggleBtn) toggleBtn.remove();
    }

    // 调整中心画布大小
    const centerPanel = document.querySelector('.center-panel');
    if (centerPanel && typeof initBackpack3D === 'function') {
      // 触发canvas重绘
      window.dispatchEvent(new Event('resize'));
    }

    // 特定屏幕尺寸优化
    if (width >= 1920) {
      document.documentElement.style.fontSize = '16px'; // 为大屏幕优化文字大小
    } else if (width >= 1080) {
      document.documentElement.style.fontSize = '14px'; // 为1080p优化文字大小
    } else {
      document.documentElement.style.fontSize = '14px'; // 默认大小
    }
  }

  // 监听窗口大小变化
  window.addEventListener('resize', handleResize);

  // 初始调用一次
  handleResize();

  // 点击背景关闭详情面板
  document.getElementById('member-detail').addEventListener('click', function(e) {
    if (e.target === this) {
      closeMemberDetail();
    }
  });
});
</script>
